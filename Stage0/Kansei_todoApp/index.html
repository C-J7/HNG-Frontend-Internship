<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kansei - Todo App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-shell">
        <aside class="sidebar" aria-label="Primary">
            <h1 class="brand">KANSEI</h1>
            <nav>
                <ul role="list" class="nav-list">
                    <li><button type="button" class="nav-item is-active" aria-current="page">Tasks</button></li>
                </ul>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <label for="task-search" class="sr-only">Search tasks</label>
                <input id="task-search" type="search" placeholder="Search tasks..." />
            </header>

            <section aria-labelledby="active-task-heading" class="content-area">
                <p class="section-kicker">THE ACT OF COMPLETION</p>
                <h2 id="active-task-heading">Active Task</h2>

                <article data-testid="test-todo-card" class="todo-card" aria-label="Todo task card">
                    <header class="todo-card-header">
                        <span data-testid="test-todo-priority" id="todo-priority" class="badge priority" aria-label="Task priority">High</span>
                        <span data-testid="test-todo-status" id="todo-status" class="status" aria-label="Task status">Pending</span>
                    </header>

                    <h3 data-testid="test-todo-title" id="todo-title">Submit Stage 0 Task</h3>

                    <p data-testid="test-todo-description" id="todo-description">
                        Finish the Kansei todo card implementation and record the explainer video.
                    </p>

                    <ul data-testid="test-todo-tags" id="todo-tags" role="list" class="tag-list" aria-label="Task tags">
                        <li data-testid="test-todo-tag-work" class="tag">Work</li>
                        <li data-testid="test-todo-tag-urgent" class="tag">Urgent</li>
                        <li class="tag">Design</li>
                    </ul>

                    <div class="todo-card-meta">
                        <p>
                            <strong>Deadline:</strong>
                            <time data-testid="test-todo-due-date" id="todo-due-date" datetime="2026-04-16T12:00:00.000Z">Due Apr 16, 2026</time>
                        </p>
                        <p aria-live="polite">
                            <strong>Time remaining:</strong>
                            <time data-testid="test-todo-time-remaining" id="todo-time-remaining">Due in 3 days</time>
                        </p>
                    </div>

                    <footer class="todo-card-actions">
                        <div class="todo-complete-wrap">
                            <input
                                data-testid="test-todo-complete-toggle"
                                id="todo-complete-toggle"
                                type="checkbox"
                                aria-label="Mark task as complete"
                            />
                            <label for="todo-complete-toggle">Completed</label>
                        </div>

                        <div class="action-buttons">
                            <button data-testid="test-todo-edit-button" id="todo-edit-button" type="button" aria-label="Edit task">
                                Edit
                            </button>
                            <button data-testid="test-todo-delete-button" id="todo-delete-button" type="button" aria-label="Delete task">
                                Delete
                            </button>
                        </div>
                    </footer>
                </article>
            </section>
        </main>
    </div>
    <script src="index.js"></script>
</body>

</html>
